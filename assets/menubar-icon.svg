<svg xmlns="http://www.w3.org/2000/svg"
  width="18" height="18"
  viewBox="0 0 18 18"
  fill="none"
  stroke="currentColor"
  stroke-width="1.5"
  stroke-linecap="round"
  stroke-linejoin="round">
  <!-- Two nodes -->
  <circle cx="3" cy="9" r="1.5" fill="currentColor" stroke="none"/>
  <circle cx="15" cy="9" r="1.5" fill="currentColor" stroke="none"/>
  <!-- Upper arc left→right -->
  <path d="M4.5 9 C4.5 5.5 13.5 5.5 13.5 9"/>
  <!-- Arrow tip pointing right on upper arc -->
  <polyline points="11.5,6.5 13.5,9 11.5,11.5"/>
</svg>
